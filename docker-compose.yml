services:
  postgres:
    image: postgres:16-alpine
    container_name: foodie-tour-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: hungtruong01/foodie-tour:latest
    container_name: foodie-tour-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT}:8080"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432

volumes:
  postgres_data:
